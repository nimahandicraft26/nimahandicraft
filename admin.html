<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nima Admin Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div id="lock" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm">
        <h2 class="text-center font-bold text-xl mb-6">NIMA ADMIN LOGIN</h2>
        
        <input type="password" id="admin-pass" placeholder="Password" class="w-full p-3 border rounded mb-4 text-center">
        <input type="password" id="gh-token" placeholder="GitHub Token (ghp_...)" class="w-full p-3 border rounded mb-4 text-center text-xs">
        
        <button onclick="login()" id="login-btn" class="w-full bg-blue-600 text-white py-3 rounded font-bold hover:bg-blue-700">Login</button>
    </div>

    <div id="dashboard" class="hidden fixed inset-0 bg-white p-10 overflow-y-auto">
        <div class="max-w-xl mx-auto">
            <h1 class="text-2xl font-bold border-b pb-4 mb-6">Dashboard is Open! ✔</h1>
            <p class="mb-4">You are successfully connected to GitHub.</p>
            <button onclick="location.reload()" class="bg-red-500 text-white px-4 py-2 rounded">Logout</button>
        </div>
    </div>

    <script>
        // Check this carefully!
        const REPO = "nimahandicraft26/nimahandicraft"; 

        async function login() {
            const pass = document.getElementById('admin-pass').value;
            const token = document.getElementById('gh-token').value;
            const btn = document.getElementById('login-btn');

            // 1. Check Password
            if (pass !== "nima@2026") {
                alert("Wrong Password!");
                return;
            }

            // 2. Check Token Format
            if (!token.startsWith("ghp_")) {
                alert("Token must start with ghp_");
                return;
            }

            btn.innerText = "Connecting...";

            try {
                const response = await fetch(`https://api.github.com/repos/${REPO}`, {
                    headers: { 'Authorization': `token ${token}` }
                });

                if (response.ok) {
                    localStorage.setItem('nima_gh_token', token);
                    document.getElementById('lock').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                } else {
                    const errorData = await response.json();
                    alert("GitHub Error: " + errorData.message);
                    btn.innerText = "Login";
                }
            } catch (err) {
                alert("System Error: Could not connect to GitHub.");
                btn.innerText = "Login";
            }
        }

        // Auto-load token if saved
        window.onload = function() {
            const saved = localStorage.getItem('nima_gh_token');
            if (saved) document.getElementById('gh-token').value = saved;
        };
    </script>
</body>
</html>
