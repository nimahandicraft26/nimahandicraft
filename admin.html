<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nima Admin | Master Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen pb-20">

    <div id="lock" class="fixed inset-0 bg-black z-[500] flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl text-center border-t-8 border-blue-600">
            <h2 class="font-black uppercase mb-6 text-2xl tracking-tighter text-gray-800">Admin Access</h2>
            <input type="password" id="admin-pass" placeholder="Enter Admin Password" class="w-full border-2 p-4 rounded-xl mb-4 text-center font-bold outline-none focus:border-blue-500">
            <button onclick="login()" id="login-btn" class="w-full bg-blue-600 text-white py-5 rounded-xl font-black uppercase tracking-widest active:scale-95 transition">Enter Manager</button>
            <p class="text-[10px] mt-4 text-gray-400 font-medium">Authentication will use saved GitHub token</p>
        </div>
    </div>

    <div id="dashboard" class="max-w-2xl mx-auto pt-10 px-4 hidden space-y-8">
        
        <div class="bg-white p-6 rounded-[30px] shadow-sm flex justify-between items-center border border-gray-200">
            <h2 class="font-black uppercase text-lg text-blue-600">Store Settings</h2>
            <button onclick="location.reload()" class="text-[10px] bg-gray-100 px-4 py-2 rounded-full font-bold text-gray-500 hover:bg-red-500 hover:text-white transition">Logout</button>
        </div>

        <div class="bg-white p-8 rounded-[40px] shadow-xl space-y-6 border border-gray-200">
            <h3 class="font-black text-gray-400 uppercase text-[10px] tracking-widest bg-gray-50 p-2 rounded text-center">1. Identity & Style</h3>
            
            <div class="space-y-4">
                <input type="text" id="s-name" placeholder="Shop Name" class="w-full border-2 p-4 rounded-2xl outline-none focus:border-blue-400">
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Name Color</label>
                        <div class="flex gap-2">
                            <input type="text" id="s-name-color" placeholder="#FFFFFF" class="w-full border-2 p-2 rounded-xl text-xs outline-none">
                            <input type="color" oninput="document.getElementById('s-name-color').value=this.value" class="h-10 w-12 rounded-lg cursor-pointer border-none shadow-sm">
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Font Family</label>
                        <select id="s-font" class="w-full border-2 p-2 rounded-xl text-xs outline-none bg-white h-[42px]">
                            <option value="Arial">Arial (Clean)</option>
                            <option value="'Times New Roman'">Serif (Classic)</option>
                            <option value="Georgia">Georgia (Elegant)</option>
                            <option value="Impact">Impact (Bold)</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Website Background Color</label>
                    <div class="flex gap-4">
                        <input type="text" id="s-color" placeholder="#F3F4F6" class="flex-grow border-2 p-4 rounded-2xl outline-none">
                        <input type="color" oninput="document.getElementById('s-color').value=this.value" class="h-14 w-14 rounded-2xl cursor-pointer border-none shadow-sm">
                    </div>
                </div>

                <hr class="opacity-50">
                
                <p class="text-[10px] font-bold text-gray-400 uppercase ml-1">Contacts Text Color</p>
                <div class="flex gap-4">
                    <input type="text" id="s-contact-color" placeholder="#000000" class="flex-grow border-2 p-4 rounded-2xl outline-none">
                    <input type="color" oninput="document.getElementById('s-contact-color').value=this.value" class="h-14 w-14 rounded-2xl cursor-pointer border-none shadow-sm">
                </div>
                
                <input type="text" id="s-whatsapp" placeholder="WhatsApp: +971..." class="w-full border-2 p-4 rounded-2xl outline-none">
                <input type="email" id="s-email" placeholder="Email Address" class="w-full border-2 p-4 rounded-2xl outline-none">
                <input type="text" id="s-loc" placeholder="Store Location" class="w-full border-2 p-4 rounded-2xl outline-none">
            </div>

            <button onclick="saveSettings()" id="btn-s" class="w-full bg-black text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition">Update Website</button>
        </div>

        <div class="bg-white p-8 rounded-[40px] shadow-xl space-y-6 border border-gray-200">
            <h3 class="font-black text-gray-400 uppercase text-[10px] tracking-widest bg-gray-50 p-2 rounded text-center">2. Inventory Management</h3>
            <input type="text" id="p-title" placeholder="Product Title" class="w-full border-2 p-4 rounded-2xl outline-none">
            <input type="text" id="p-price" placeholder="Price (e.g. 150 AED)" class="w-full border-2 p-4 rounded-2xl outline-none">
            <input type="text" id="p-img" placeholder="Image Name (e.g. item1.jpg)" class="w-full border-2 p-4 rounded-2xl outline-none">
            <textarea id="p-desc" placeholder="Brief description of the product..." rows="3" class="w-full border-2 p-4 rounded-2xl outline-none"></textarea>
            <button onclick="addProduct()" id="btn-p" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition">Upload Product</button>
        </div>
    </div>

    <script>
        // AUTHENTICATION SETTINGS
        const GITHUB_TOKEN = "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"; 
        const REPO = "nimahandicraft26/nimahandicraft"; 

        async function login() {
            const pass = document.getElementById('admin-pass').value;
            const btn = document.getElementById('login-btn');
            
            if(pass !== "nima@2026") { alert("Access Denied: Incorrect Password"); return; }
            
            btn.innerText = "Authenticating...";
            
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}`, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                if(res.ok) {
                    document.getElementById('lock').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                } else { 
                    console.error("Status:", res.status);
                    alert("GitHub Auth Failed! Please verify the token scopes include 'repo'."); 
                    btn.innerText = "Enter Manager"; 
                }
            } catch (e) { alert("Network error. Please try again."); }
        }

        async function pushToGitHub(path, content, sha = null, method = "PUT") {
            const url = `https://api.github.com/repos/${REPO}/contents/${path}`;
            if (!sha && method !== "DELETE") {
                const res = await fetch(url, { headers: { Authorization: `token ${GITHUB_TOKEN}` } });
                if (res.ok) { const d = await res.json(); sha = d.sha; }
            }
            const body = { message: "System update via Admin Panel", sha: sha };
            if (method !== "DELETE") body.content = btoa(unescape(encodeURIComponent(content)));

            const response = await fetch(url, {
                method: method,
                headers: { Authorization: `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });
            return response.ok;
        }

        async function saveSettings() {
            const btn = document.getElementById('btn-s'); btn.innerText = "Saving...";
            const data = {
                site_name: document.getElementById('s-name').value,
                site_name_color: document.getElementById('s-name-color').value,
                site_font: document.getElementById('s-font').value,
                site_color: document.getElementById('s-color').value,
                contact_color: document.getElementById('s-contact-color').value,
                whatsapp: document.getElementById('s-whatsapp').value,
                email: document.getElementById('s-email').value,
                address: document.getElementById('s-loc').value
            };
            const success = await pushToGitHub('settings.json', JSON.stringify(data, null, 2));
            btn.innerText = success ? "Success!" : "Upload Error";
            setTimeout(() => btn.innerText = "Update Website", 2000);
        }

        async function addProduct() {
            const btn = document.getElementById('btn-p'); btn.innerText = "Processing...";
            const title = document.getElementById('p-title').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value;
            const desc = document.getElementById('p-desc').value;
            const file = img.split('.')[0] + ".json";

            const pData = { title, price, image1: "images/"+img, description: desc };
            await pushToGitHub(`content/products/${file}`, JSON.stringify(pData, null, 2));

            const lRes = await fetch(`https://api.github.com/repos/${REPO}/contents/content/products/list.json`, {
                headers: { Authorization: `token ${GITHUB_TOKEN}` }
            });
            const lData = await lRes.json();
            const list = JSON.parse(atob(lData.content));
            if (!list.find(p => p.file === file)) {
                list.push({ file: file });
                await pushToGitHub('content/products/list.json', JSON.stringify(list, null, 2), lData.sha);
            }
            btn.innerText = "Done!"; setTimeout(() => btn.innerText = "Upload Product", 2000);
        }
    </script>
</body>
</html>
