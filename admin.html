<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nima Admin | Pro Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="lock" class="fixed inset-0 bg-black z-[500] flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl text-center">
            <h2 class="font-black uppercase mb-6 text-2xl tracking-tighter text-gray-800">Admin Login</h2>
            <input type="password" id="admin-pass" placeholder="Password" class="w-full border-2 p-4 rounded-xl mb-4 text-center font-bold outline-none focus:border-blue-500">
            <input type="password" id="gh-token" placeholder="GitHub Token" class="w-full border-2 p-4 rounded-xl mb-6 text-xs text-center outline-none focus:border-blue-500">
            <button onclick="login()" id="login-btn" class="w-full bg-blue-600 text-white py-5 rounded-xl font-black uppercase tracking-widest active:scale-95 transition">Enter Dashboard</button>
        </div>
    </div>

    <div id="dashboard" class="max-w-2xl mx-auto pt-10 px-4 pb-20 hidden">
        <div class="bg-white p-8 rounded-[40px] shadow-xl space-y-10 border border-gray-200">
            
            <div class="flex justify-between items-center border-b pb-4">
                <h2 class="font-black uppercase text-xl text-blue-600 tracking-tighter">Nima Store Manager</h2>
                <button onclick="location.reload()" class="text-[10px] bg-gray-100 px-4 py-2 rounded-full font-bold text-gray-500 hover:bg-red-500 hover:text-white transition">Logout</button>
            </div>

            <section class="space-y-4">
                <h3 class="font-black text-gray-400 uppercase text-[10px] tracking-widest bg-gray-50 p-2 rounded">1. Add New Product</h3>
                <input type="text" id="p-title" placeholder="Product Title (e.g., Handmade Pashmina)" class="w-full border-2 p-4 rounded-2xl outline-none">
                <input type="text" id="p-price" placeholder="Price (e.g., 150 AED)" class="w-full border-2 p-4 rounded-2xl outline-none">
                <input type="text" id="p-img" placeholder="Image Filename (e.g., bag1.jpg)" class="w-full border-2 p-4 rounded-2xl outline-none">
                <textarea id="p-desc" placeholder="Product Description..." rows="3" class="w-full border-2 p-4 rounded-2xl outline-none"></textarea>
                <button onclick="addProduct()" id="btn-p" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition">Upload to Store</button>
            </section>

            <hr>

            <section class="space-y-4">
                <h3 class="font-black text-red-400 uppercase text-[10px] tracking-widest bg-red-50 p-2 rounded">2. Delete a Product</h3>
                <p class="text-[10px] text-gray-400">Enter the exact name of the product JSON file to delete (e.g., bag1.json)</p>
                <div class="flex gap-2">
                    <input type="text" id="del-filename" placeholder="filename.json" class="flex-grow border-2 p-4 rounded-2xl outline-none border-red-100 focus:border-red-500">
                    <button onclick="deleteProduct()" id="btn-del" class="bg-red-600 text-white px-6 rounded-2xl font-bold uppercase text-xs active:scale-95 transition">Delete</button>
                </div>
            </section>
        </div>
    </div>

    <script>
        let GITHUB_TOKEN = "";
        const REPO = "nimahandicraft26/nimahandicraft"; 

        async function login() {
            const pass = document.getElementById('admin-pass').value;
            const token = document.getElementById('gh-token').value;
            const btn = document.getElementById('login-btn');
            if(pass !== "nima@2026") { alert("Wrong Password!"); return; }
            btn.innerText = "Connecting...";
            GITHUB_TOKEN = token;
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}`, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                if(res.ok) {
                    localStorage.setItem('nima_gh_token', GITHUB_TOKEN);
                    document.getElementById('lock').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                } else { alert("GitHub Auth Failed!"); btn.innerText = "Login"; }
            } catch (e) { alert("Network Error"); }
        }

        window.onload = function() {
            const saved = localStorage.getItem('nima_gh_token');
            if(saved) document.getElementById('gh-token').value = saved;
        };

        async function pushToGitHub(path, content, sha = null, method = "PUT") {
            const url = `https://api.github.com/repos/${REPO}/contents/${path}`;
            if (!sha && method !== "DELETE") {
                const res = await fetch(url, { headers: { Authorization: `token ${GITHUB_TOKEN}` } });
                if (res.ok) { const d = await res.json(); sha = d.sha; }
            }
            const body = { message: "Admin update", sha: sha };
            if (method !== "DELETE") body.content = btoa(unescape(encodeURIComponent(content)));

            const response = await fetch(url, {
                method: method,
                headers: { Authorization: `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });
            return response.ok;
        }

        async function addProduct() {
            const btn = document.getElementById('btn-p'); btn.innerText = "Uploading...";
            const title = document.getElementById('p-title').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value;
            const desc = document.getElementById('p-desc').value;
            const file = img.split('.')[0] + ".json";

            const pData = { title, price, image1: "images/"+img, description: desc };
            await pushToGitHub(`content/products/${file}`, JSON.stringify(pData, null, 2));

            const lRes = await fetch(`https://api.github.com/repos/${REPO}/contents/content/products/list.json`, {
                headers: { Authorization: `token ${GITHUB_TOKEN}` }
            });
            const lData = await lRes.json();
            const list = JSON.parse(atob(lData.content));
            if (!list.find(p => p.file === file)) {
                list.push({ file: file });
                await pushToGitHub('content/products/list.json', JSON.stringify(list, null, 2), lData.sha);
            }
            btn.innerText = "Done!"; setTimeout(() => btn.innerText = "Upload to Store", 2000);
        }

        async function deleteProduct() {
            const btn = document.getElementById('btn-del');
            const file = document.getElementById('del-filename').value;
            if(!file.endsWith('.json')) { alert("Please enter the full name like 'bag1.json'"); return; }
            if(!confirm("Are you sure you want to delete " + file + "?")) return;

            btn.innerText = "Deleting...";
            
            // 1. Delete the individual JSON file
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/content/products/${file}`, {
                headers: { Authorization: `token ${GITHUB_TOKEN}` }
            });
            if(res.ok) {
                const data = await res.json();
                await pushToGitHub(`content/products/${file}`, null, data.sha, "DELETE");
            }

            // 2. Remove from list.json
            const lRes = await fetch(`https://api.github.com/repos/${REPO}/contents/content/products/list.json`, {
                headers: { Authorization: `token ${GITHUB_TOKEN}` }
            });
            const lData = await lRes.json();
            let list = JSON.parse(atob(lData.content));
            list = list.filter(item => item.file !== file);
            await pushToGitHub('content/products/list.json', JSON.stringify(list, null, 2), lData.sha);

            btn.innerText = "Deleted!"; setTimeout(() => btn.innerText = "Delete", 2000);
        }
    </script>
</body>
</html>
