<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nima Admin | Easy Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen pb-20">

    <div id="lock" class="fixed inset-0 bg-black z-[500] flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl text-center border-t-8 border-blue-600">
            <h2 class="font-black uppercase mb-6 text-2xl tracking-tighter text-gray-800">Admin Login</h2>
            
            <div class="space-y-4">
                <input type="password" id="admin-pass" placeholder="Admin Password" class="w-full border-2 p-4 rounded-xl text-center font-bold outline-none focus:border-blue-500">
                
                <input type="password" id="github-token-input" placeholder="Paste GitHub Token Here" class="w-full border-2 p-4 rounded-xl text-center text-xs outline-none focus:border-blue-500">
            </div>

            <button onclick="login()" id="login-btn" class="w-full mt-6 bg-blue-600 text-white py-5 rounded-xl font-black uppercase tracking-widest active:scale-95 transition">Login to Manager</button>
            <p class="text-[10px] mt-4 text-gray-400">Password: nima@2026</p>
        </div>
    </div>

    <div id="dashboard" class="max-w-2xl mx-auto pt-10 px-4 hidden space-y-8">
        <div class="bg-white p-6 rounded-[30px] shadow-sm flex justify-between items-center border border-gray-200">
            <h2 class="font-black uppercase text-lg text-blue-600">Store Manager</h2>
            <button onclick="location.reload()" class="text-[10px] bg-gray-100 px-4 py-2 rounded-full font-bold text-gray-500">Logout</button>
        </div>

        <div class="bg-white p-8 rounded-[40px] shadow-xl space-y-6 border border-gray-200">
            <h3 class="font-black text-gray-400 uppercase text-[10px] tracking-widest bg-gray-50 p-2 rounded text-center">1. Site Design</h3>
            <div class="space-y-4">
                <input type="text" id="s-name" placeholder="Shop Name" class="w-full border-2 p-4 rounded-2xl outline-none">
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Name Color</label>
                        <input type="color" id="s-name-color-picker" oninput="document.getElementById('s-name-color').value=this.value" class="w-full h-10 rounded-lg cursor-pointer">
                        <input type="hidden" id="s-name-color">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Font</label>
                        <select id="s-font" class="w-full border-2 p-2 rounded-xl text-xs outline-none bg-white h-[40px]">
                            <option value="Arial">Arial</option>
                            <option value="Georgia">Georgia</option>
                            <option value="Impact">Impact</option>
                        </select>
                    </div>
                </div>

                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Background Color</label>
                <input type="color" id="s-color-picker" oninput="document.getElementById('s-color').value=this.value" class="w-full h-12 rounded-2xl cursor-pointer">
                <input type="hidden" id="s-color">

                <hr>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Contact Details Color</label>
                <input type="color" id="s-contact-color-picker" oninput="document.getElementById('s-contact-color').value=this.value" class="w-full h-12 rounded-2xl cursor-pointer">
                <input type="hidden" id="s-contact-color">

                <input type="text" id="s-whatsapp" placeholder="WhatsApp Number" class="w-full border-2 p-4 rounded-2xl outline-none">
                <input type="email" id="s-email" placeholder="Email" class="w-full border-2 p-4 rounded-2xl outline-none">
                <input type="text" id="s-loc" placeholder="Location" class="w-full border-2 p-4 rounded-2xl outline-none">
            </div>
            <button onclick="saveSettings()" id="btn-s" class="w-full bg-black text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-lg">Save All Settings</button>
        </div>

        <div class="bg-white p-8 rounded-[40px] shadow-xl space-y-6 border border-gray-200">
            <h3 class="font-black text-gray-400 uppercase text-[10px] tracking-widest bg-gray-50 p-2 rounded text-center">2. New Product</h3>
            <input type="text" id="p-title" placeholder="Product Title" class="w-full border-2 p-4 rounded-2xl outline-none">
            <input type="text" id="p-price" placeholder="Price" class="w-full border-2 p-4 rounded-2xl outline-none">
            <input type="text" id="p-img" placeholder="Image Name (bag1.jpg)" class="w-full border-2 p-4 rounded-2xl outline-none">
            <textarea id="p-desc" placeholder="Description..." rows="3" class="w-full border-2 p-4 rounded-2xl outline-none"></textarea>
            <button onclick="addProduct()" id="btn-p" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-lg">Upload to Store</button>
        </div>
    </div>

    <script>
        let GITHUB_TOKEN = "";
        const REPO = "nimahandicraft26/nimahandicraft"; 

        async function login() {
            const pass = document.getElementById('admin-pass').value;
            const token = document.getElementById('github-token-input').value.trim();
            const btn = document.getElementById('login-btn');
            
            if(pass !== "nima@2026") { alert("Wrong Password!"); return; }
            if(!token) { alert("Please paste your GitHub Token!"); return; }
            
            GITHUB_TOKEN = token;
            btn.innerText = "Checking...";
            
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}`, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                if(res.ok) {
                    document.getElementById('lock').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                } else { 
                    alert("Auth Failed! Check if your Token has 'repo' permission."); 
                    btn.innerText = "Login to Manager"; 
                }
            } catch (e) { alert("Error connecting to GitHub"); }
        }

        async function pushToGitHub(path, content, sha = null, method = "PUT") {
            const url = `https://api.github.com/repos/${REPO}/contents/${path}`;
            if (!sha && method !== "DELETE") {
                const res = await fetch(url, { headers: { Authorization: `token ${GITHUB_TOKEN}` } });
                if (res.ok) { const d = await res.json(); sha = d.sha; }
            }
            const body = { message: "Update via Admin", sha: sha };
            if (method !== "DELETE") body.content = btoa(unescape(encodeURIComponent(content)));

            const response = await fetch(url, {
                method: method,
                headers: { Authorization: `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });
            return response.ok;
        }

        async function saveSettings() {
            const btn = document.getElementById('btn-s'); btn.innerText = "Saving...";
            const data = {
                site_name: document.getElementById('s-name').value,
                site_name_color: document.getElementById('s-name-color').value,
                site_font: document.getElementById('s-font').value,
                site_color: document.getElementById('s-color').value,
                contact_color: document.getElementById('s-contact-color').value,
                whatsapp: document.getElementById('s-whatsapp').value,
                email: document.getElementById('s-email').value,
                address: document.getElementById('s-loc').value
            };
            const success = await pushToGitHub('settings.json', JSON.stringify(data, null, 2));
            btn.innerText = success ? "Success!" : "Failed!";
            setTimeout(() => btn.innerText = "Save All Settings", 2000);
        }

        async function addProduct() {
            const btn = document.getElementById('btn-p'); btn.innerText = "Uploading...";
            const title = document.getElementById('p-title').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value;
            const desc = document.getElementById('p-desc').value;
            const file = img.split('.')[0] + ".json";

            const pData = { title, price, image1: "images/"+img, description: desc };
            await pushToGitHub(`content/products/${file}`, JSON.stringify(pData, null, 2));

            const lRes = await fetch(`https://api.github.com/repos/${REPO}/contents/content/products/list.json`, {
                headers: { Authorization: `token ${GITHUB_TOKEN}` }
            });
            const lData = await lRes.json();
            const list = JSON.parse(atob(lData.content));
            if (!list.find(p => p.file === file)) {
                list.push({ file: file });
                await pushToGitHub('content/products/list.json', JSON.stringify(list, null, 2), lData.sha);
            }
            btn.innerText = "Done!"; setTimeout(() => btn.innerText = "Upload to Store", 2000);
        }
    </script>
</body>
</html>
