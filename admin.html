<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nima Cloud Admin | Smart Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen pb-20">

    <div id="lock" class="fixed inset-0 bg-black z-[500] flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl">
            <h2 class="font-black text-center uppercase mb-6 text-2xl tracking-tighter">Nima Login</h2>
            <input type="password" id="admin-pass" placeholder="Admin Password" class="w-full border-2 p-4 rounded-xl mb-4 outline-none focus:border-red-500 text-center font-bold">
            
            <div id="token-box">
                <input type="password" id="gh-token" placeholder="Paste GitHub Token (One time only)" class="w-full border-2 p-4 rounded-xl mb-6 outline-none focus:border-red-500 text-xs text-center">
            </div>

            <button onclick="login()" class="w-full bg-black text-white py-5 rounded-xl font-black uppercase tracking-widest active:scale-95 transition">Login</button>
            <p id="status-msg" class="text-[10px] text-gray-400 mt-4 text-center italic"></p>
        </div>
    </div>

    <div id="dashboard" class="max-w-2xl mx-auto pt-10 px-4 hidden">
        <div class="bg-white p-8 rounded-[40px] shadow-xl space-y-10">
            
            <div class="flex justify-between items-center border-b pb-4">
                <h2 class="font-black uppercase text-xl">Dashboard</h2>
                <button onclick="logout()" class="text-[10px] bg-gray-100 px-3 py-1 rounded-full font-bold text-gray-500 hover:bg-red-50 hover:text-red-500">Logout & Clear Token</button>
            </div>

            <section class="space-y-4">
                <h3 class="font-black text-red-500 uppercase text-xs">1. Shop Identity & Style</h3>
                <input type="text" id="s-name" placeholder="New Shop Name" class="w-full border-2 p-4 rounded-2xl outline-none">
                <div class="flex gap-4">
                    <input type="text" id="s-color" placeholder="Brand Color (#hex)" class="flex-grow border-2 p-4 rounded-2xl outline-none">
                    <input type="color" id="color-picker" oninput="document.getElementById('s-color').value=this.value" class="h-14 w-14 rounded-2xl cursor-pointer border-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="s-logo" placeholder="Logo filename" class="border-2 p-4 rounded-2xl">
                    <input type="text" id="s-cover" placeholder="Cover filename" class="border-2 p-4 rounded-2xl">
                </div>
                <button onclick="saveSettings()" id="btn-s" class="w-full bg-black text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition">Update Website Now</button>
            </section>

            <hr class="border-gray-100">

            <section class="space-y-4">
                <h3 class="font-black text-red-500 uppercase text-xs">2. Add New Product</h3>
                <input type="text" id="p-title" placeholder="Product Title" class="w-full border-2 p-4 rounded-2xl">
                <input type="text" id="p-price" placeholder="Price (e.g. 150 AED)" class="w-full border-2 p-4 rounded-2xl">
                <input type="text" id="p-img" placeholder="Image Name (e.g. bag5.jpg)" class="w-full border-2 p-4 rounded-2xl">
                <button onclick="addProduct()" id="btn-p" class="w-full bg-red-600 text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition">Upload to Live Store</button>
            </section>
        </div>
    </div>

    <script>
    let GITHUB_TOKEN = "";
    // !!! SET YOUR CORRECT REPO NAME HERE !!!
    const REPO = "nimahandicraft26/nimahandicraft"; 

    window.onload = function() {
        // Checking if token is saved in browser memory
        const savedToken = localStorage.getItem('nima_gh_token');
        if(savedToken) {
            document.getElementById('gh-token').value = savedToken;
            document.getElementById('remember-check').checked = true;
            console.log("Saved token found and loaded.");
        }
    };

    function login() {
        const passInput = document.getElementById('admin-pass').value;
        const tokenInput = document.getElementById('gh-token').value;
        const rememberMe = document.getElementById('remember-check').checked;

        // CHECK YOUR PASSWORD HERE:
        if(passInput === "Nimahandicraft2026@*") {
            // Check if Token starts with ghp_
            if(tokenInput.startsWith("ghp_")) {
                GITHUB_TOKEN = tokenInput;
                
                // If 'Remember Me' is checked, save it
                if(rememberMe) {
                    localStorage.setItem('nima_gh_token', GITHUB_TOKEN);
                } else {
                    localStorage.removeItem('nima_gh_token');
                }

                // Open Dashboard
                document.getElementById('lock').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            } else {
                alert("Invalid GitHub Token! It must start with 'ghp_'.");
            }
        } else {
            alert("Wrong Password! Please use the correct password to login.");
        }
    }
</script>
</body>
</html>
