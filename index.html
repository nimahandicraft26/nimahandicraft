<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nima Handicraft | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-color: #ea4747; }
        body { font-family: 'Inter', sans-serif; }
        .bg-main { background-color: var(--main-color); }
        .text-main { color: var(--main-color); }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <header class="relative w-full h-28 md:h-40 flex flex-col items-center justify-center text-center overflow-hidden">
        <img src="images/cover.jpeg" class="absolute inset-0 w-full h-full object-cover opacity-90" alt="Cover">
        <div class="relative z-10">
            <div class="bg-white p-1 rounded-full shadow-lg inline-block mb-1">
                <img src="images/logo.jpeg" class="h-10 md:h-14 w-10 md:w-14 rounded-full object-cover">
            </div>
            <h1 class="text-white text-lg md:text-2xl font-black uppercase tracking-widest drop-shadow-md">Nima Handicraft</h1>
        </div>
    </header>

    <main class="flex-grow max-w-[1500px] mx-auto py-6 px-2 w-full">
        <div class="border-b border-gray-200 mb-6 pb-2">
            <h2 class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-400">Our Premium Collection</h2>
        </div>

        <div id="product-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3">
            </div>
    </main>

    <footer class="bg-white border-t py-6 text-center mt-auto">
        <div id="f-details" class="flex flex-wrap justify-center gap-4 text-[9px] font-bold text-gray-400 uppercase tracking-tight"></div>
        <p class="text-[8px] text-gray-200 mt-2 tracking-widest">© 2026 NIMA HANDICRAFT</p>
    </footer>

    <div id="cart-modal" class="fixed inset-0 bg-black/80 hidden z-[200] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-xs p-6 shadow-2xl">
            <h3 class="font-black uppercase text-sm mb-4">Your Order</h3>
            <div id="cart-items" class="space-y-2 mb-4 max-h-32 overflow-y-auto"></div>
            <form action="https://formspree.io/f/mrerqqre" method="POST" class="space-y-2">
                <input type="hidden" name="Order" id="hidden-cart-input">
                <input type="text" name="Name" placeholder="Name" class="w-full bg-gray-50 border p-3 rounded-lg text-xs outline-none" required>
                <input type="text" name="WhatsApp" placeholder="WhatsApp" class="w-full bg-gray-50 border p-3 rounded-lg text-xs outline-none" required>
                <button type="submit" class="w-full bg-black text-white py-3 rounded-lg font-black text-[10px] uppercase">Confirm Order</button>
            </form>
            <button onclick="toggleCart()" class="w-full mt-2 text-[9px] uppercase font-bold text-gray-400">Close</button>
        </div>
    </div>

    <div id="floating-cart" class="fixed bottom-6 right-6 z-[100] cursor-pointer" onclick="toggleCart()">
        <div class="bg-main p-4 rounded-full shadow-xl relative">
            <i class="fas fa-shopping-bag text-white text-lg"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-black text-white text-[9px] rounded-full h-5 w-5 flex items-center justify-center border-2 border-white">0</span>
        </div>
    </div>

   <script>
    let cart = [];

    async function loadWebsite() {
        try {
            // 1. Load Settings (Color, Contact Info)
            const settingsResponse = await fetch('settings.json');
            const settings = await settingsResponse.json();
            
            if(settings.site_color) {
                document.documentElement.style.setProperty('--main-color', settings.site_color);
            }
            
            // Update UI with contact information
            document.getElementById('f-details').innerHTML = `
                <span><i class="fab fa-whatsapp text-green-500"></i> ${settings.whatsapp}</span>
                <span><i class="far fa-envelope text-red-400"></i> ${settings.email}</span>
                <span><i class="fas fa-map-marker-alt"></i> ${settings.address}</span>
            `;

            // 2. Load the Master List (list.json)
            const listResponse = await fetch('content/products/list.json');
            const productList = await listResponse.json();

            const productGrid = document.getElementById('product-list');
            productGrid.innerHTML = ""; // Clear the loading state

            // 3. Dynamic Product Loader
            for (const item of productList) {
                try {
                    const productResponse = await fetch(`content/products/${item.file}`);
                    const product = await productResponse.json();

                    productGrid.innerHTML += `
                        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col h-full group">
                            <div class="h-32 md:h-40 overflow-hidden relative">
                                <img src="${product.image1}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" loading="lazy">
                            </div>
                            <div class="p-2 md:p-3 flex flex-col flex-grow text-left">
                                <h2 class="text-[9px] md:text-[10px] font-bold text-gray-800 leading-tight h-8 overflow-hidden mb-1">${product.title}</h2>
                                <p class="text-main font-black text-xs">${product.price}</p>
                                <button onclick="addToCart('${product.title}', '${product.price}', event)" 
                                    class="mt-2 w-full bg-black text-white py-1.5 rounded-lg uppercase text-[8px] font-black tracking-tighter active:scale-95 transition">
                                    Add to Cart
                                </button>
                            </div>
                        </div>
                    `;
                } catch (productError) {
                    console.error("Error: Could not load product file - " + item.file);
                }
            }
        } catch (masterListError) { 
            console.error("Error: Master list.json is missing or invalid.");
            document.getElementById('product-list').innerHTML = `
                <p class="col-span-full text-center text-gray-300 py-10 uppercase text-[10px] font-bold tracking-widest">
                    No products found in the collection.
                </p>`;
        }
    }

    // Shopping Cart Logic
    function addToCart(name, price, event) {
        cart.push({name, price});
        document.getElementById('cart-count').innerText = cart.length;
        
        // Success feedback on button
        const originalBtnText = event.target.innerText;
        event.target.innerText = "Added!";
        setTimeout(() => event.target.innerText = originalBtnText, 1000);
    }

    function updateCartUI() {
        const cartItemsContainer = document.getElementById('cart-items');
        if(cart.length === 0) {
            cartItemsContainer.innerHTML = `<p class="text-center text-gray-300 py-5 text-[10px] uppercase font-bold">Your cart is empty</p>`;
        } else {
            cartItemsContainer.innerHTML = cart.map(item => `
                <div class="flex justify-between items-center bg-gray-50 p-2 rounded-lg text-[10px] font-bold">
                    <span>${item.name}</span>
                    <span class="text-main">${item.price}</span>
                </div>
            `).join('');
        }
        document.getElementById('hidden-cart-input').value = JSON.stringify(cart);
    }

    function toggleCart() { 
        updateCartUI();
        document.getElementById('cart-modal').classList.toggle('hidden'); 
    }

    // Initialize the website
    loadWebsite();
</script>
</body>
</html>
