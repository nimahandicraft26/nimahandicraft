<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nima Handicraft | Authentic Handmade Store</title>

    <meta name="description" content="Authentic handmade bags and handicrafts . Best quality handmade products in Dubai, UAE. Shop Nima Handicraft.">
    <meta name="keywords" content="Nima Handicraft, Bags, Handmade , Dubai Handicrafts, Hemp Bags, Art">
    <meta name="author" content="Nima Handicraft">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --main-color: #ea4747; }
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        .bg-main { background-color: var(--main-color); }
        .text-main { color: var(--main-color); }
        .border-main { border-color: var(--main-color); }

        /* Animation: Cart Pulse when item added */
        @keyframes cartPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .pulse-animation { animation: cartPulse 0.4s ease-out; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <header class="relative w-full h-48 md:h-72 bg-gray-200">
        <img src="images/cover.jpeg" class="w-full h-full object-cover" alt="Nima Handicraft Store Cover">
        
        <div class="absolute top-4 left-4">
            <div class="bg-white p-1 rounded shadow-xl border border-gray-50">
                <img src="images/logo.jpeg" class="h-12 md:h-20 w-auto" alt="Nima Logo">
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-6xl mx-auto py-12 px-4 w-full">
        <div class="flex items-center justify-between border-b-2 border-main mb-12 pb-4">
            <h2 class="text-2xl md:text-4xl font-black uppercase tracking-tighter text-gray-800 italic">Latest Collection</h2>
            <div class="text-right">
                <p class="text-[10px] text-gray-400 uppercase tracking-widest leading-none">Original Quality</p>
                <p class="text-xs font-bold text-main uppercase">Nepal to Dubai</p>
            </div>
        </div>

        <div id="product-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-12">
            </div>
    </main>

    <div id="floating-cart" class="fixed bottom-10 right-8 z-[100] cursor-pointer" onclick="toggleCart()">
        <div class="bg-main p-5 md:p-6 rounded-full shadow-[0_15px_40px_rgba(0,0,0,0.2)] flex items-center justify-center relative transform transition hover:scale-110 active:scale-90">
            <i class="fas fa-shopping-bag text-white text-2xl"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-black text-white text-[11px] font-bold rounded-full h-7 w-7 flex items-center justify-center border-2 border-white">0</span>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-[200] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] shadow-2xl max-w-md w-full overflow-hidden">
            <div class="p-8 md:p-10">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-2xl font-black uppercase tracking-tight">Your Selection</h3>
                    <button onclick="toggleCart()" class="text-gray-300 hover:text-black transition"><i class="fas fa-times text-2xl"></i></button>
                </div>
                
                <div id="cart-items" class="space-y-4 max-h-52 overflow-y-auto mb-8 pr-2">
                    </div>

                <form action="https://formspree.io/f/mrerqqre" method="POST" class="space-y-4">
                    <input type="hidden" name="Order_Summary" id="hidden-cart-input">
                    <input type="text" name="Name" placeholder="Full Name" class="w-full bg-gray-50 p-5 rounded-2xl border-none outline-none focus:ring-2 focus:ring-main text-sm" required>
                    <input type="email" name="Email" placeholder="Your Gmail Address" class="w-full bg-gray-50 p-5 rounded-2xl border-none outline-none focus:ring-2 focus:ring-main text-sm" required>
                    <input type="text" name="WhatsApp" placeholder="WhatsApp No. (e.g. 971...)" class="w-full bg-gray-50 p-5 rounded-2xl border-none outline-none focus:ring-2 focus:ring-main text-sm" required>
                    
                    <button type="submit" class="w-full bg-black text-white py-5 rounded-2xl font-black mt-4 hover:bg-gray-800 transition uppercase tracking-[0.2em] text-xs shadow-xl active:scale-95">
                        Place Order via Gmail
                    </button>
                </form>
            </div>
        </div>
    </div>

    <footer class="bg-white border-t border-gray-100 py-12 text-center">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex flex-wrap justify-center gap-10 text-[10px] md:text-xs text-gray-400 uppercase font-black tracking-widest mb-8">
                <span id="f-whatsapp"></span>
                <span id="f-email"></span>
                <span id="f-address"></span>
            </div>
            <div class="h-[1px] w-20 bg-gray-100 mx-auto mb-6"></div>
            <p class="text-[9px] text-gray-300 tracking-[0.5em]">© 2026 NIMA HANDICRAFT | AUTHENTIC NEPALESE CRAFT</p>
        </div>
    </footer>

    <script>
        let cart = [];

        async function loadWebsite() {
            try {
                // 1. Load Settings (Name, Color, Contact)
                const sRes = await fetch('settings.json');
                const settings = await sRes.json();
                
                // Change Website Color Dynamically
                if(settings.site_color) {
                    document.documentElement.style.setProperty('--main-color', settings.site_color);
                }

                document.getElementById('f-whatsapp').innerHTML = `<i class="fab fa-whatsapp text-green-500 mr-2 text-sm"></i> ${settings.whatsapp}`;
                document.getElementById('f-email').innerHTML = `<i class="far fa-envelope text-red-400 mr-2 text-sm"></i> ${settings.email}`;
                document.getElementById('f-address').innerHTML = `<i class="fas fa-map-marker-alt text-gray-300 mr-2 text-sm"></i> ${settings.address}`;

                // 2. Load Product from bag1.json
                const pRes = await fetch('content/products/bag1.json');
                const product = await pRes.json();

                const pList = document.getElementById('product-list');
                pList.innerHTML = `
                    <div class="bg-white rounded-[2.5rem] shadow-sm border border-gray-100 overflow-hidden group hover:shadow-2xl transition-all duration-700">
                        <div class="relative overflow-hidden h-[24rem]">
                            <img src="${product.image1}" class="product-img w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                            <div class="absolute top-6 left-6 bg-white/90 backdrop-blur px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-tighter shadow-sm">Premium Handmade</div>
                        </div>
                        <div class="p-8">
                            <h2 class="text-2xl font-black text-gray-800 tracking-tight">${product.title}</h2>
                            <p class="text-main font-black text-3xl mt-2 tracking-tighter">${product.price}</p>
                            <p class="text-gray-400 text-xs mt-4 leading-relaxed font-medium line-clamp-2">${product.description}</p>
                            <button onclick="addToCart('${product.title}', '${product.price}', event)" 
                                class="mt-8 w-full bg-white border-2 border-black py-4 rounded-2xl uppercase text-[10px] font-black tracking-[0.2em] hover:bg-black hover:text-white transition-all shadow-sm active:scale-95">
                                Add to Cart
                            </button>
                        </div>
                    </div>
                `;
            } catch (e) { 
                console.error("Critical Error: settings.json or product files missing!"); 
            }
        }

        // FLYING EFFECT & CART LOGIC
        function addToCart(name, price, event) {
            const btn = event.currentTarget;
            const img = btn.closest('.group').querySelector('.product-img');

            const flyingImg = img.cloneNode();
            const imgRect = img.getBoundingClientRect();
            const cartRect = document.getElementById('floating-cart').getBoundingClientRect();

            Object.assign(flyingImg.style, {
                position: 'fixed',
                left: imgRect.left + 'px',
                top: imgRect.top + 'px',
                width: imgRect.width + 'px',
                height: imgRect.height + 'px',
                borderRadius: '2rem',
                zIndex: '1000',
                opacity: '0.8',
                transition: 'all 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275)',
                pointerEvents: 'none'
            });

            document.body.appendChild(flyingImg);

            // Animate towards cart
            setTimeout(() => {
                Object.assign(flyingImg.style, {
                    left: (cartRect.left + 30) + 'px',
                    top: (cartRect.top + 30) + 'px',
                    width: '30px',
                    height: '30
