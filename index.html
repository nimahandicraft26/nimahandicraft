<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nima Handicraft | Premium Handmade Store</title>
    
    <meta name="description" content="Authentic premium handmade products and handicrafts. High-quality collection in Dubai, UAE. Shop Nima Handicraft.">
    <meta name="keywords" content="Nima Handicraft, Handmade Bags, Premium Handicrafts, Dubai Shop, Quality Collection">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --main-color: #ea4747; }
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        .bg-main { background-color: var(--main-color); }
        .text-main { color: var(--main-color); }
        .border-main { border-color: var(--main-color); }
        @keyframes cartPulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .pulse-animation { animation: cartPulse 0.4s ease-out; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <header class="relative w-full h-32 md:h-48 bg-gray-200 flex items-center justify-center">
        <img src="images/cover.jpeg" class="absolute inset-0 w-full h-full object-cover" alt="Cover">
        <div class="relative z-10 bg-white p-1 rounded-lg shadow-2xl border border-gray-100">
            <img src="images/logo.jpeg" class="h-14 md:h-20 w-auto" alt="Logo">
        </div>
    </header>

    <main class="flex-grow max-w-6xl mx-auto py-10 px-4 w-full text-center">
        <div class="border-b-2 border-main mb-10 pb-3 inline-block mx-auto px-12">
            <h2 class="text-2xl font-black uppercase tracking-tighter text-gray-800">Our Collection</h2>
        </div>

        <div id="product-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10 text-left">
            <p class="col-span-full text-center text-gray-400 py-10 tracking-widest uppercase text-xs font-bold">Discovering Excellence...</p>
        </div>
    </main>

    <div id="floating-cart" class="fixed bottom-8 right-6 z-[100] cursor-pointer" onclick="toggleCart()">
        <div class="bg-main p-5 rounded-full shadow-2xl flex items-center justify-center relative transform transition hover:scale-110 active:scale-95">
            <i class="fas fa-shopping-bag text-white text-xl"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-black text-white text-[10px] font-bold rounded-full h-6 w-6 flex items-center justify-center border-2 border-white shadow-lg">0</span>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/70 backdrop-blur-md hidden z-[200] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] shadow-2xl max-w-md w-full p-8 md:p-10">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-black uppercase tracking-tight">Your Cart</h3>
                <button onclick="toggleCart()" class="text-gray-400 hover:text-black transition"><i class="fas fa-times text-2xl"></i></button>
            </div>
            <div id="cart-items" class="space-y-4 mb-8 max-h-48 overflow-y-auto pr-2"></div>
            
            <form action="https://formspree.io/f/mrerqqre" method="POST" class="space-y-4">
                <input type="hidden" name="Order_Summary" id="hidden-cart-input">
                <input type="text" name="Customer_Name" placeholder="Full Name" class="w-full bg-gray-50 border-none p-5 rounded-2xl focus:ring-2 focus:ring-main outline-none text-sm shadow-sm" required>
                <input type="email" name="Customer_Email" placeholder="Your Gmail" class="w-full bg-gray-50 border-none p-5 rounded-2xl focus:ring-2 focus:ring-main outline-none text-sm shadow-sm" required>
                <input type="text" name="WhatsApp" placeholder="WhatsApp Number" class="w-full bg-gray-50 border-none p-5 rounded-2xl focus:ring-2 focus:ring-main outline-none text-sm shadow-sm" required>
                <button type="submit" class="w-full bg-black text-white py-5 rounded-2xl font-black mt-4 hover:bg-gray-800 transition uppercase tracking-widest text-xs shadow-xl active:scale-95">Confirm Order</button>
            </form>
        </div>
    </div>

    <footer class="bg-white border-t border-gray-100 py-10 w-full mt-12">
        <div class="max-w-6xl mx-auto px-4 flex flex-col items-center gap-4 text-gray-400 font-bold uppercase tracking-[0.2em] text-[10px] md:text-xs">
            <div id="f-details" class="flex flex-wrap justify-center gap-8">
                </div>
            <div class="h-[1px] w-12 bg-gray-100"></div>
            <p class="text-gray-300 tracking-[0.5em]">© 2026 NIMA HANDICRAFT</p>
        </div>
    </footer>

    <script>
        let cart = [];

        async function loadWebsite() {
            try {
                const sRes = await fetch('settings.json');
                const settings = await sRes.json();
                
                if(settings.site_color) document.documentElement.style.setProperty('--main-color', settings.site_color);

                document.getElementById('f-details').innerHTML = `
                    <span><i class="fab fa-whatsapp text-green-500 mr-2"></i> ${settings.whatsapp}</span>
                    <span><i class="far fa-envelope text-red-500 mr-2"></i> ${settings.email}</span>
                    <span><i class="fas fa-map-marker-alt text-gray-300 mr-2"></i> ${settings.address}</span>
                `;

                const pRes = await fetch('content/products/bag1.json');
                const product = await pRes.json();

                const pList = document.getElementById('product-list');
                pList.innerHTML = `
                    <div class="bg-white rounded-[2.5rem] shadow-sm border border-gray-100 overflow-hidden group hover:shadow-2xl transition-all duration-700">
                        <div class="h-80 overflow-hidden relative">
                            <img src="${product.image1}" class="product-img w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                            <div class="absolute bottom-4 left-6 bg-white/90 backdrop-blur px-4 py-1 rounded-full text-[10px] font-black uppercase italic shadow-sm tracking-tighter">Authentic Collection</div>
                        </div>
                        <div class="p-8">
                            <h2 class="text-xl font-black text-gray-800 tracking-tight">${product.title}</h2>
                            <p class="text-main font-black text-2xl mt-1 tracking-tighter">${product.price}</p>
                            <p class="text-gray-400 text-xs mt-4 leading-relaxed font-medium line-clamp-2">${product.description}</p>
                            <button onclick="addToCart('${product.title}', '${product.price}', event)" 
                                class="mt-6 w-full bg-white border-2 border-black py-4 rounded-2xl uppercase text-[10px] font-black tracking-widest hover:bg-black hover:text-white transition-all shadow-sm active:scale-95">
                                Add to Cart
                            </button>
                        </div>
                    </div>
                `;
            } catch (e) { 
                document.getElementById('product-list').innerHTML = `<p class="col-span-full text-center text-gray-300 font-bold uppercase text-[10px] py-10 tracking-widest">Unable to load product collection.</p>`;
            }
        }

        function addToCart(name, price, event) {
            cart.push({name, price});
            updateCartUI();
            const cartBtn = document.querySelector('#floating-cart div');
            cartBtn.classList.add('pulse-animation');
            setTimeout(() => cartBtn.classList.remove('pulse-animation'), 400);
            event.target.innerText = "Item Added!";
            setTimeout(() => event.target.innerText = "Add to Cart", 1500);
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const itemsDiv = document.getElementById('cart-items');
            itemsDiv.innerHTML = cart.length === 0 ? `<p class="text-gray-300 text-center py-10 text-[10px] uppercase font-bold tracking-widest">Cart is empty</p>` :
                cart.map((item, index) => `
                    <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl border border-gray-100 text-xs">
                        <span class="font-black uppercase tracking-tight">${item.name}</span>
                        <span class="text-main font-bold">${item.price}</span>
                    </div>
                `).join('');
            document.getElementById('hidden-cart-input').value = JSON.stringify(cart);
        }

        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }

        loadWebsite();
    </script>
</body>
</html>
