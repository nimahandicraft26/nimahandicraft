<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nima Handicraft | Official Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-color: #ea4747; }
        body { font-family: 'Inter', sans-serif; transition: background 0.3s; }
        .bg-main { background-color: var(--main-color); }
        .text-main { color: var(--main-color); }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <header class="relative w-full h-32 md:h-44 flex flex-col items-center justify-center text-center overflow-hidden">
        <img id="site-cover" src="images/cover.jpeg" class="absolute inset-0 w-full h-full object-cover opacity-90" alt="Store Cover">
        <div class="relative z-10">
            <div class="bg-white p-1 rounded-full shadow-lg inline-block mb-1">
                <img id="site-logo" src="images/logo.jpeg" class="h-10 md:h-14 w-10 md:w-14 rounded-full object-cover">
            </div>
            <h1 id="shop-name-display" class="text-white text-lg md:text-2xl font-black uppercase tracking-widest drop-shadow-md">Nima Handicraft</h1>
            <p class="text-white text-[8px] md:text-[10px] uppercase tracking-[0.3em] font-bold opacity-80">Premium Collection</p>
        </div>
    </header>

    <main class="flex-grow max-w-[1600px] mx-auto py-6 px-4 w-full">
        <div class="border-b border-gray-200 mb-6 pb-2 flex justify-between items-center">
            <h2 class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-400">Our Collection</h2>
        </div>

        <div id="product-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
            <p class="col-span-full text-center text-gray-400 py-10 uppercase text-[10px] font-bold tracking-widest">Loading Items...</p>
        </div>
    </main>

    <footer class="bg-white border-t py-8 mt-auto">
        <div id="f-details" class="flex flex-wrap justify-center gap-6 text-[9px] font-bold text-gray-400 uppercase tracking-tight"></div>
        <p class="text-[8px] text-gray-200 mt-4 tracking-widest text-center">© 2026 NIMA HANDICRAFT | DUBAI, UAE</p>
    </footer>

    <div id="floating-cart" class="fixed bottom-6 right-6 z-[100] cursor-pointer" onclick="toggleCart()">
        <div class="bg-main p-4 rounded-full shadow-xl relative">
            <i class="fas fa-shopping-bag text-white text-lg"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-black text-white text-[9px] rounded-full h-5 w-5 flex items-center justify-center border-2 border-white">0</span>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-[200] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b pb-2">
                <h3 class="font-black uppercase text-sm">Your Order</h3>
                <button onclick="toggleCart()"><i class="fas fa-times text-gray-400 text-xl"></i></button>
            </div>
            <div id="cart-items" class="space-y-2 mb-6 max-h-40 overflow-y-auto"></div>
            <form action="https://formspree.io/f/mrerqqre" method="POST" class="space-y-3">
                <input type="hidden" name="Order_Summary" id="hidden-cart-input">
                <input type="text" name="Name" placeholder="Full Name" class="w-full bg-gray-50 border p-3 rounded-xl text-xs outline-none" required>
                <input type="text" name="WhatsApp" placeholder="WhatsApp Number" class="w-full bg-gray-50 border p-3 rounded-xl text-xs outline-none" required>
                <button type="submit" class="w-full bg-black text-white py-4 rounded-xl font-black text-[10px] uppercase tracking-widest">Confirm via Gmail</button>
            </form>
        </div>
    </div>

    <script>
        let cart = [];

        async function loadWebsite() {
            try {
                const settingsRes = await fetch('settings.json');
                const settings = await settingsRes.json();
                
                // 1. APPLY DYNAMIC COLORS & FONTS
                if(settings.site_color) document.documentElement.style.setProperty('--main-color', settings.site_color);
                
                const shopHeader = document.getElementById('shop-name-display');
                if(settings.site_name) shopHeader.innerText = settings.site_name;
                if(settings.site_name_color) shopHeader.style.color = settings.site_name_color;
                if(settings.site_font) shopHeader.style.fontFamily = settings.site_font;

                const footDetails = document.getElementById('f-details');
                footDetails.innerHTML = `
                    <span><i class="fab fa-whatsapp"></i> ${settings.whatsapp}</span>
                    <span><i class="far fa-envelope"></i> ${settings.email}</span>
                    <span><i class="fas fa-map-marker-alt"></i> ${settings.address}</span>
                `;
                // Apply Contact Text Color
                if(settings.contact_color) footDetails.style.color = settings.contact_color;

                // 2. LOAD PRODUCTS
                const listRes = await fetch('content/products/list.json');
                const productList = await listRes.json();
                const pGrid = document.getElementById('product-list');
                pGrid.innerHTML = ""; 

                for (const item of productList) {
                    try {
                        const pRes = await fetch(`content/products/${item.file}`);
                        const p = await pRes.json();
                        pGrid.innerHTML += `
                            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col h-full group">
                                <div class="h-36 md:h-44 overflow-hidden relative">
                                    <img src="${p.image1}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                                </div>
                                <div class="p-3 flex flex-col flex-grow">
                                    <h2 class="text-[10px] font-black text-gray-800 leading-tight h-8 overflow-hidden">${p.title}</h2>
                                    <p class="text-main font-black text-xs mt-1">${p.price}</p>
                                    
                                    <p class="text-[9px] text-gray-500 mt-2 line-clamp-2 leading-tight flex-grow">
                                        ${p.description || ''}
                                    </p>

                                    <button onclick="addToCart('${p.title}', '${p.price}', event)" 
                                        class="mt-3 w-full bg-black text-white py-2 rounded-lg uppercase text-[8px] font-black tracking-tighter active:scale-95 transition">
                                        Add to Cart
                                    </button>
                                </div>
                            </div>`;
                    } catch (e) { console.error("Missing product data:", item.file); }
                }
            } catch (e) { console.error("Settings error:", e); }
        }

        function addToCart(name, price, event) {
            cart.push({name, price});
            document.getElementById('cart-count').innerText = cart.length;
            event.target.innerText = "Added!";
            setTimeout(() => event.target.innerText = "Add to Cart", 1000);
        }

        function updateCartUI() {
            const itemsDiv = document.getElementById('cart-items');
            itemsDiv.innerHTML = cart.map(item => `<div class="flex justify-between text-[10px] bg-gray-50 p-2 rounded"><span>${item.name}</span><b>${item.price}</b></div>`).join('');
            document.getElementById('hidden-cart-input').value = JSON.stringify(cart);
        }

        function toggleCart() { updateCartUI(); document.getElementById('cart-modal').classList.toggle('hidden'); }
        loadWebsite();
    </script>
</body>
</html>
